<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
    
    <nav class="navbar navbar-expand-lg navbar-light bg-light" th:fragment="navbar(current)">
        <div class="container-fluid">
            <a th:href="@{/}" class="navbar-brand">Spec-Jva: Spring Pizzeria</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a th:href="@{/}" class="nav-link">
                            Home
                        </a>
                    </li>
                    <li class="nav-item">
                        <a th:href="@{/pizzas}" class="nav-link">
                            Pizze
                        </a>
                    </li>
                </ul>
                <form class="d-flex" role="search" id="searchbar" th:action="@{/pizzas}" method="get">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" name="search" th:value="${search}"/>
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>
            </div>
        </div>
    </nav>

</body>
</html>
