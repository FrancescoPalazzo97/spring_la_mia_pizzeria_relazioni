<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="~{fragments/resources :: headTags}"></div>
    <title>Discounts</title>
</head>
<body>
    <nav th:replace="~{fragments/nav :: navbar('discounts')}"></nav>

    <main>

        <div class="container" th:object="${pizza}">
            
            <section class="row">
                <div class="col-12">

                    <h1 class="py-4 mb-2 text-center fw-bold">
                        Create discount for [[${discount.pizza.name}]]
                    </h1>

                    <div class="row justify-content-center">
                        
                        <form id="book-form" th:action="${edit} ? @{|/discounts/edit/${borrowing.id}|} : @{/discounts/create}" method="post" th:object="${discount}">

                            <input type="hidden" th:field="*{pizza}" id="linked-pizza">

                            <div class="mb-3">
                                <label class="form-label" for="title">Title: </label>
                                <input type="text" id="title" class="form-control" th:field="*{title}" th:errorClass="is-invalid">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}">
                                    <ul>
                                        <li th:each="error : ${#fields.errors('title')}" th:text="${error}"></li>
                                    </ul>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="start-date">Start date: </label>
                                <input type="date" id="start-date" class="form-control" th:field="*{startDate}" th:errorClass="is-invalid">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('startDate')}">
                                    <ul>
                                        <li th:each="error : ${#fields.errors('startDate')}" th:text="${error}"></li>
                                    </ul>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label" for="end-date">End date: : </label>
                                <input type="date" id="end-date" class="form-control" th:field="*{endDate}" th:errorClass="is-invalid">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('endDate')}">
                                    <ul>
                                        <li th:each="error : ${#fields.errors('endDate')}" th:text="${error}"></li>
                                    </ul>
                                </div>
                            </div>

                            <div class="mb-3 d-flex justify-content-between">
                                <button type="submit" class="btn btn-primary">Save</button>
                                <button type="reset" class="btn btn-warning">Reset all fields</button>
                            </div>
                        </form>

                    </div>

                </div>
            </section>
        
        </div>
    </main>

    <script th:replace="~{fragments/resources :: scripts}"></script>
</body>
</html>
